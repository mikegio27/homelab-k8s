apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  interval: 1h
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: minio
  values:
    mode: standalone

    existingSecret: lgtm-minio-credentials

    persistence:
      enabled: true
      storageClass: local-path
      size: 100Gi

    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: 1000m

    # Pre-create buckets that Mimir, Loki, and Tempo need
    buckets:
      - name: mimir-blocks
        policy: none
        purge: false
      - name: mimir-ruler
        policy: none
        purge: false
      - name: mimir-alertmanager
        policy: none
        purge: false
      - name: loki-chunks
        policy: none
        purge: false
      - name: loki-ruler
        policy: none
        purge: false
      - name: loki-admin
        policy: none
        purge: false
      - name: tempo-traces
        policy: none
        purge: false

    # Dedicated service account used by Loki, Mimir and Tempo for S3 access.
    # The secret key is pulled from the SealedSecret (key: lgtmPassword).
    users:
      - accessKey: lgtm
        existingSecret: lgtm-minio-credentials
        existingSecretKey: lgtmPassword
        policy: readwrite

    service:
      type: ClusterIP
      port: 9000

    consoleService:
      type: ClusterIP
      port: 9001

    metrics:
      serviceMonitor:
        enabled: false # flip to true once Alloy is up
