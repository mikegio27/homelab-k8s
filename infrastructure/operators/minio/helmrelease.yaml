apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  interval: 1h
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: minio
  values:
    mode: standalone

    rootUser: minio
    rootPassword: changeme-strong-password  # replace or use a Secret ref

    persistence:
      enabled: true
      storageClass: nfs-client          # your NFS subdir provisioner
      size: 100Gi

    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: 1000m

    # Pre-create buckets that Mimir, Loki, and Tempo need
    buckets:
      - name: mimir-blocks
        policy: none
        purge: false
      - name: mimir-ruler
        policy: none
        purge: false
      - name: mimir-alertmanager
        policy: none
        purge: false
      - name: loki-chunks
        policy: none
        purge: false
      - name: loki-ruler
        policy: none
        purge: false
      - name: loki-admin
        policy: none
        purge: false
      - name: tempo-traces
        policy: none
        purge: false

    # Create a dedicated service account for the LGTM stack
    users:
      - accessKey: lgtm
        secretKey: changeme-lgtm-password    # replace or use a Secret ref
        policy: readwrite

    service:
      type: ClusterIP
      port: 9000

    consoleService:
      type: ClusterIP
      port: 9001

    metrics:
      serviceMonitor:
        enabled: false   # flip to true once Alloy is up