apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vlan10-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.10.50-10.0.10.70
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vlan10-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - vlan10-pool