apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: loki
spec:
  interval: 24h
  # grafana/loki, /tempo and /grafana charts migrated to grafana-community in
  # early 2026. We pin the last grafana.github.io versions so every chart's
  # values structure matches what these manifests target. To move to the newer
  # community charts, switch this URL to
  # https://grafana-community.github.io/helm-charts and bump the chart version.
  url: https://grafana.github.io/helm-charts
