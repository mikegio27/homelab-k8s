apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  interval: 1h
  chart:
    spec:
      chart: nvidia-device-plugin
      version: ">=0.17.0"
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: nvidia-device-plugin
  values:
    nodeSelector:
      gpu: "true"