apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  values:
    operatorConfig:
      authProxyConfig:
        enabled: false
    oauth:
      clientId:
        secretKeyRef:
          name: tailscale-oauth
          key: client_id
      clientSecret:
        secretKeyRef:
          name: tailscale-oauth
          key: client_secret