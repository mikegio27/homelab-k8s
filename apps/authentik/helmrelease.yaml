apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: authentik-secrets
      valuesKey: secret-key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secrets
      valuesKey: postgresql-password
      targetPath: authentik.postgresql.password
  values:
    authentik:
      error_reporting:
        enabled: false
      redis:
        host: redis-master.redis.svc.cluster.local
        port: 6379

    server:
      ingress:
        enabled: false            # we manage IngressRoute ourselves

    postgresql:
      enabled: true               # uses bundled postgres — swap for CNPG later if you want
      auth:
        existingSecret: authentik-secrets
        secretKeys:
          adminPasswordKey: postgresql-postgres-password
          userPasswordKey: postgresql-password