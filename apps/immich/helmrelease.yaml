apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 24h
  chart:
    spec:
      chart: immich
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: immich
      interval: 24h
  values:
    server:
      controllers:
        main:
          # Alloy scrapes Immich's API metrics (port 8081). We set the telemetry
          # env directly rather than immich.metrics.enabled, which only emits
          # Prometheus-Operator ServiceMonitors (not used here).
          pod:
            annotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8081"
              prometheus.io/path: "/metrics"
          containers:
            main:
              image:
                tag: v2.7.5
              env:
                DB_HOSTNAME: "immich-db-rw.immich.svc.cluster.local"
                IMMICH_TELEMETRY_INCLUDE: "all"
                DB_DATABASE_NAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-secrets
                      key: db-database
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-secrets
                      key: db-username
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-secrets
                      key: db-password
              resources:
                limits:
                  nvidia.com/gpu: 1
                requests:
                  nvidia.com/gpu: 1

    immich:
      persistence:
        library:
          existingClaim: immich-library

    machine-learning:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                limits:
                  nvidia.com/gpu: 1
                requests:
                  nvidia.com/gpu: 1

    valkey:
      enabled: true
