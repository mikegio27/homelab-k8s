# TEMPLATE — NOT applied by Flux (not listed in kustomization.yaml).
#
# Grafana reads its Authentik OIDC client credentials from a Secret named
# `grafana-oidc` in the `grafana` namespace. Create it like this:
#
# 1. In Authentik, create an OAuth2/OpenID provider + application for Grafana:
#      - Redirect URI: https://grafana.dozydelta.com/login/generic_oauth
#      - Note the generated Client ID and Client Secret.
#      - (Optional) create groups `grafana-admins` / `grafana-editors` and add
#        a Groups scope mapping so the role_attribute_path mapping works.
#
# 2. Seal the credentials and commit the result over this file, then add
#    `sealed-secret.yaml` to kustomization.yaml:
#
#      kubectl create secret generic grafana-oidc \
#        --namespace grafana \
#        --from-literal=clientId='<CLIENT_ID>' \
#        --from-literal=clientSecret='<CLIENT_SECRET>' \
#        --dry-run=client -o yaml \
#      | kubeseal --format yaml \
#          --controller-name sealed-secrets-controller \
#          --controller-namespace kube-system \
#      > apps/grafana/sealed-secret.yaml
#
# The resulting SealedSecret will look like the block below (encryptedData
# values will be real ciphertext):
#
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: grafana-oidc
#   namespace: grafana
# spec:
#   encryptedData:
#     clientId: <sealed>
#     clientSecret: <sealed>
#   template:
#     metadata:
#       name: grafana-oidc
#       namespace: grafana
#     type: Opaque
