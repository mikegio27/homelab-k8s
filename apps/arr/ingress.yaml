apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr.dozydelta.com`)
      kind: Rule
      middlewares:
        - name: ak-outpost-dozynet
          namespace: authentik
      services:
        - name: sonarr
          port: 8989
  tls:
    secretName: dozydelta-wildcard-tls
---
