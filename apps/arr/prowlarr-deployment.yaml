apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9707"
    spec:
      containers:
        - name: prowlarr
          image: ghcr.io/linuxserver/prowlarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Phoenix"
          ports:
            - containerPort: 9696
          volumeMounts:
            - name: config
              mountPath: /config
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.3.0
          args: ["prowlarr"]
          env:
            - name: PORT
              value: "9707"
            - name: URL
              value: "http://localhost:9696"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: arr-exporter-keys
                  key: prowlarr
                  optional: true   # pod still starts before the key is sealed
          ports:
            - name: metrics
              containerPort: 9707
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config-local
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: arr
spec:
  selector:
    app: prowlarr
  ports:
    - port: 9696
      targetPort: 9696