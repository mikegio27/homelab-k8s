---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: arr
  labels:
    app: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bazarr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9707"
    spec:
      containers:
        - name: bazarr
          image: lscr.io/linuxserver/bazarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Phoenix"
          ports:
            - containerPort: 6767
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.3.0
          args: ["bazarr"]
          env:
            - name: PORT
              value: "9707"
            - name: URL
              value: "http://localhost:6767"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: arr-exporter-keys
                  key: bazarr
                  optional: true   # pod still starts before the key is sealed
          ports:
            - name: metrics
              containerPort: 9707
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: media
          persistentVolumeClaim:
            claimName: arr-media

---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: arr
  labels:
    app: bazarr
spec:
  selector:
    app: bazarr
  ports:
    - port: 6767
      targetPort: 6767
