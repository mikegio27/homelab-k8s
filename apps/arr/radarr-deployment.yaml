apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9707"
    spec:
      containers:
        - name: radarr
          image: ghcr.io/linuxserver/radarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Phoenix"
          ports:
            - containerPort: 7878
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: media
              mountPath: /media
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.3.0
          args: ["radarr"]
          env:
            - name: PORT
              value: "9707"
            - name: URL
              value: "http://localhost:7878"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: arr-exporter-keys
                  key: radarr
                  optional: true   # pod still starts before the key is sealed
          ports:
            - name: metrics
              containerPort: 9707
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config-local
        - name: downloads
          persistentVolumeClaim:
            claimName: arr-downloads
        - name: media
          persistentVolumeClaim:
            claimName: arr-media
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: arr
spec:
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878